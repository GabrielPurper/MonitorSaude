<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Monitor de Saúde</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Font Awesome para ícones de olho -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h2>Cadastro</h2>

    <form id="cadastroForm">
      <input type="text" id="cadastroNome" placeholder="Seu nome completo" required>
      <input type="email" id="cadastroEmail" placeholder="Seu e-mail" required>

      <div class="password-field">
        <input type="password" id="cadastroSenha" placeholder="Senha (8+ caracteres, 1 símbolo)" required>
      </div>

      <div class="password-field">
        <input type="password" id="cadastroConfirmarSenha" placeholder="Confirme a senha" required>
      </div>

      <button type="submit">Cadastrar</button>
    </form>

    <div id="erroCadastro"></div>

    <a class="link" href="index1.html">Já tem conta? Faça login</a>
  </div>

  <!-- ÚNICO SCRIPT -->
  <script src="cadastro.js"></script>
</body>
</html>
