<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Monitor de Saúde</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Firebase (versão compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body>
  <div class="container">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Seu e-mail" required>

      <div class="password-field">
        <input type="password" id="loginSenha" placeholder="Sua senha" required>
      </div>

      <button type="submit">Entrar</button>
    </form>

    <div id="erroLogin"></div>

    <a class="link" href="index2.html">Não tem conta? Cadastre-se</a>
  </div>

  <!-- Seu JS externo -->
  <script src="login.js"></script>
</body>
</html>
